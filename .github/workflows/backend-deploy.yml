name: Backend Deploy — Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'gcp/cloud-run/**'
  workflow_dispatch:

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: sistema-de-gestao-16e15
  REGION: southamerica-east1
  SERVICE: clinicnest-api
  IMAGE_REGISTRY: southamerica-east1-docker.pkg.dev/sistema-de-gestao-16e15/clinicnest/clinicnest-api

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 — Lint, Test & Build validation
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: gcp/cloud-run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gcp/cloud-run/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Verify dist output exists
        run: |
          test -f dist/server.js || { echo "dist/server.js not found"; exit 1; }
          echo "Build output verified: $(find dist -name '*.js' | wc -l) JS files"

  # ──────────────────────────────────────────────────────────────
  # Job 2 — Build Docker image via Cloud Build & push to Artifact Registry
  # ──────────────────────────────────────────────────────────────
  build-image:
    name: Build Image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image: ${{ steps.build.outputs.image }}

    defaults:
      run:
        working-directory: gcp/cloud-run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gcp/cloud-run/package-lock.json

      - name: Install production dependencies & build
        run: |
          npm ci
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build & push image via Cloud Build
        id: build
        run: |
          IMAGE_TAG="${{ env.IMAGE_REGISTRY }}:${{ github.sha }}"
          LATEST_TAG="${{ env.IMAGE_REGISTRY }}:latest"

          gcloud builds submit \
            --tag "$IMAGE_TAG" \
            --project ${{ env.PROJECT_ID }} \
            --timeout=600 \
            --quiet

          # Tag as latest
          gcloud artifacts docker tags add "$IMAGE_TAG" "$LATEST_TAG" --quiet 2>/dev/null || true

          echo "image=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "✅ Image built and pushed: $IMAGE_TAG"

  # ──────────────────────────────────────────────────────────────
  # Job 3 — Deploy to Cloud Run & verify health
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-image
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ needs.build-image.outputs.image }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 300 \
            --port 8080 \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:clinicnest-db \
            --service-account clinicnest-api@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }},NODE_ENV=production,FRONTEND_URL=https://clinicnest.metaclass.com.br" \
            --set-secrets "CLOUDSQL_CONNECTION_STRING=CLOUDSQL_CONNECTION_STRING:latest,CLOUDSQL_DB_PASSWORD=CLOUDSQL_DB_PASSWORD:latest,CRON_SECRET=CRON_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM=RESEND_FROM:latest,ASAAS_API_KEY=ASAAS_API_KEY:latest,ASAAS_API_BASE_URL=ASAAS_API_BASE_URL:latest,ASAAS_BASE_URL=ASAAS_BASE_URL:latest,ASAAS_SANDBOX=ASAAS_SANDBOX:latest,ASAAS_WEBHOOK_TOKEN=ASAAS_WEBHOOK_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,AUTOMATION_WORKER_KEY=AUTOMATION_WORKER_KEY:latest,EMAIL_FROM=EMAIL_FROM:latest,SITE_URL=SITE_URL:latest,PUBLIC_SITE_URL=PUBLIC_SITE_URL:latest,PUBLIC_APP_URL=PUBLIC_APP_URL:latest,GCP_SERVICE_ACCOUNT_KEY=GCP_SERVICE_ACCOUNT_KEY:latest,GCP_REGION=GCP_REGION:latest,GEMINI_MODEL=GEMINI_MODEL:latest,FIREBASE_API_KEY=FIREBASE_API_KEY:latest,FIREBASE_SERVICE_ACCOUNT_KEY=FIREBASE_SERVICE_ACCOUNT_KEY:latest,CLINIC_EMAIL_DOMAIN=CLINIC_EMAIL_DOMAIN:latest,SALES_CHATBOT_SECRET=SALES_CHATBOT_SECRET:latest,CONTACT_ADMIN_EMAIL=CONTACT_ADMIN_EMAIL:latest,CONTACT_EMAIL_FROM=CONTACT_EMAIL_FROM:latest,SUPPORT_EMAIL_FROM=SUPPORT_EMAIL_FROM:latest,SUPPORT_EMAIL_TO=SUPPORT_EMAIL_TO:latest,CORS_ALLOWED_ORIGINS=CORS_ALLOWED_ORIGINS:latest" \
            --quiet

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)")
          echo "🔗 Service URL: $SERVICE_URL"

          # Wait for new revision to stabilize
          REVISION=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.latestReadyRevisionName)")
          echo "📦 Active revision: $REVISION"

          # Health check with retries
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -sS -o /tmp/health-response.json -w "%{http_code}" \
              "$SERVICE_URL/health" --max-time 10 2>/dev/null || echo "000")
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed"
              cat /tmp/health-response.json 2>/dev/null || true
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "❌ Health check failed after $MAX_RETRIES attempts"
          echo "Last response:"
          cat /tmp/health-response.json 2>/dev/null || true
          exit 1
