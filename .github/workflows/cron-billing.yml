name: Billing Cron Jobs

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/30 * * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: billing-cron
  cancel-in-progress: false

jobs:
  run:
    name: Run scheduled billing jobs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Call billing cron endpoints
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "Missing PROD_BASE_URL secret" && exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret" && exit 1
          fi

          call_api () {
            local path="$1"
            echo ""
            echo "=== POST $BASE_URL$path ==="
            # -L follows redirects (common with http->https or domain canonicalization)
            # -sS silent except errors
            # -D - prints headers
            # -o prints body
            curl -L -sS -D - \
              -X POST "$BASE_URL$path" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -o /tmp/resp.json \
              -w "\nHTTP_STATUS=%{http_code}\n" || true
            echo "--- body ---"
            cat /tmp/resp.json || true
            echo "------------"
          }

          echo "Event: $GITHUB_EVENT_NAME"
          echo "Now: $(date -u)"

          # Decide which endpoints to call based on schedule frequency.
          # - */5: retry
          # - */30: retry + monitor
          # - 0 3: retry + monitor + reconcile

          # Always run retry
          call_api "/api/asaas-webhook-retry"

          MINUTE=$(date -u +%M)
          HOUR=$(date -u +%H)

          # Every 30 minutes
          if [ $((10#$MINUTE % 30)) -eq 0 ]; then
            call_api "/api/monitor-asaas-webhook-failures"
          fi

          # Daily at 03:00 UTC
          if [ "$HOUR" = "03" ] && [ "$MINUTE" = "00" ]; then
            call_api "/api/asaas-reconcile-subscriptions"
          fi
