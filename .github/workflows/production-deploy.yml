name: Production Deploy — Firebase Hosting

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'gcp/cloud-run/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1 — Lint, Typecheck, Test
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --passWithNoTests

  # ──────────────────────────────────────────────────────────────
  # Job 2 — Build production bundle
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$VITE_API_BASE_URL" ] && MISSING="$MISSING VITE_API_BASE_URL"
          [ -z "$VITE_FIREBASE_API_KEY" ] && MISSING="$MISSING VITE_FIREBASE_API_KEY"
          [ -z "$VITE_FIREBASE_PROJECT_ID" ] && MISSING="$MISSING VITE_FIREBASE_PROJECT_ID"
          [ -z "$VITE_FIREBASE_APP_ID" ] && MISSING="$MISSING VITE_FIREBASE_APP_ID"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing required secrets:$MISSING"
            exit 1
          fi
          echo "✅ All required secrets present"
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: sistema-de-gestao-16e15.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: sistema-de-gestao-16e15.firebasestorage.app
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_PRODUCTION_URL: ${{ secrets.VITE_PRODUCTION_URL }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "❌ dist/index.html not found"; exit 1; }
          FILE_COUNT=$(find dist -type f | wc -l)
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "✅ Build verified: $FILE_COUNT files, $TOTAL_SIZE total"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ──────────────────────────────────────────────────────────────
  # Job 3 — Deploy to Firebase Hosting & verify
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          target: clinicnest

      - name: Verify deployment
        run: |
          MAX_RETRIES=5
          RETRY_DELAY=10
          SITE_URL="https://clinicnest.metaclass.com.br"

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 10 2>/dev/null || echo "000")
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Site is live at $SITE_URL"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              sleep $RETRY_DELAY
            fi
          done

          echo "⚠️ Site returned HTTP $HTTP_STATUS (may still be propagating)"
