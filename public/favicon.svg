<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f766e"/>
      <stop offset="55%"  stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <radialGradient id="shine" cx="35%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Inner shine -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>

  <!-- ── Stethoscope icon (white) ──────────────────────────────────────── -->

  <!-- Binaural tubes: U-shape connecting the two earpieces -->
  <path
    d="M 162 148 C 162 200, 186 236, 256 244 C 326 236, 350 200, 350 148"
    fill="none"
    stroke="white"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Main flexible tube: from U-junction down-right to chest piece -->
  <path
    d="M 256 244 C 256 300, 268 345, 312 376 C 335 393, 362 400, 380 390"
    fill="none"
    stroke="white"
    stroke-width="34"
    stroke-linecap="round"
  />

  <!-- Chest piece — outer ring (diaphragm) -->
  <circle cx="382" cy="396" r="62" fill="none" stroke="white" stroke-width="34"/>
  <!-- Chest piece — centre membrane dot -->
  <circle cx="382" cy="396" r="18" fill="white"/>

  <!-- Left earpiece tip -->
  <circle cx="162" cy="120" r="28" fill="white"/>
  <!-- Right earpiece tip -->
  <circle cx="350" cy="120" r="28" fill="white"/>
</svg>
